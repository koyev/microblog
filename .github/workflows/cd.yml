name: CD

on:
  push:
    branches: [main]

env:
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
  RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
  GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

jobs:
  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create root .env
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          RABBITMQ_USER=${RABBITMQ_USER}
          RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          EOF

      - name: Create per-service .env files
        run: |
          cat > user-service/.env <<EOF
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@user-db:5432/userdb
          OTLP_ENDPOINT=http://jaeger:4318
          EOF

          cat > post-service/.env <<EOF
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@post-db:5432/postdb
          RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq/
          OTLP_ENDPOINT=http://jaeger:4318
          EOF

          cat > comment-service/.env <<EOF
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@comment-db:5432/commentdb
          OTLP_ENDPOINT=http://jaeger:4318
          EOF

          cat > notification-service/.env <<EOF
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@notification-db:5432/notificationdb
          RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq/
          OTLP_ENDPOINT=http://jaeger:4318
          EOF

      - name: Build all images
        run: docker compose build

      - name: Start services
        run: docker compose up -d --wait

      - name: Health check - all services
        run: |
          for svc_port in "user-service:8001" "post-service:8002" "comment-service:8003" "notification-service:8004" "api-gateway:8080"; do
            svc="${svc_port%%:*}"
            port="${svc_port##*:}"
            ok=0
            for i in $(seq 1 12); do
              STATUS=$(python3 -c "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:${port}/health',timeout=3); sys.exit(0 if r.status==200 else 1)" 2>/dev/null && echo "200" || echo "fail")
              if [ "$STATUS" = "200" ]; then echo "${svc} healthy"; ok=1; break; fi
              echo "Waiting for ${svc}... ($i/12)"; sleep 5
            done
            [ "$ok" = "1" ] || (echo "${svc} failed health check" && docker compose logs ${svc} && exit 1)
          done

      - name: Run E2E smoke tests
        run: |
          pip install httpx pytest pytest-timeout
          pytest e2e-tests/ -v --timeout=30

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to AWS ECS
    needs: integration-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          for svc in api-gateway user-service post-service comment-service notification-service; do
            docker build -t $REGISTRY/microblog/$svc:$TAG -t $REGISTRY/microblog/$svc:latest ./$svc
            docker push $REGISTRY/microblog/$svc:$TAG
            docker push $REGISTRY/microblog/$svc:latest
          done

      - name: Register new task definitions and update ECS services
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
          CLUSTER: microblog
        run: |
          for svc in api-gateway user-service post-service comment-service notification-service; do
            IMAGE="$REGISTRY/microblog/$svc:$TAG"

            TASK_DEF=$(sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" ecs/$svc.json)

            NEW_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            aws ecs update-service \
              --cluster $CLUSTER \
              --service microblog-$svc \
              --task-definition $NEW_ARN \
              --output text

            echo "Deployed microblog-$svc → $NEW_ARN"
          done
