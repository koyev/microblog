name: CD

on:
  push:
    branches: [main]

env:
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
  RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
  GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

jobs:
  integration-tests:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create root .env
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          RABBITMQ_USER=${RABBITMQ_USER}
          RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          EOF

      - name: Create per-service .env files
        run: |
          cat > user-service/.env <<EOF
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@user-db:5432/userdb
          OTLP_ENDPOINT=http://jaeger:4318
          EOF

          cat > post-service/.env <<EOF
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@post-db:5432/postdb
          RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq/
          OTLP_ENDPOINT=http://jaeger:4318
          EOF

          cat > comment-service/.env <<EOF
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@comment-db:5432/commentdb
          OTLP_ENDPOINT=http://jaeger:4318
          EOF

          cat > notification-service/.env <<EOF
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@notification-db:5432/notificationdb
          RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq/
          OTLP_ENDPOINT=http://jaeger:4318
          EOF

      - name: Build all images
        run: docker compose build

      - name: Start services
        run: docker compose up -d --wait

      - name: Health check - all services
        run: |
          for svc_port in "user-service:8001" "post-service:8002" "comment-service:8003" "notification-service:8004" "api-gateway:8080"; do
            svc="${svc_port%%:*}"
            port="${svc_port##*:}"
            ok=0
            for i in $(seq 1 12); do
              STATUS=$(python3 -c "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:${port}/health',timeout=3); sys.exit(0 if r.status==200 else 1)" 2>/dev/null && echo "200" || echo "fail")
              if [ "$STATUS" = "200" ]; then echo "${svc} healthy"; ok=1; break; fi
              echo "Waiting for ${svc}... ($i/12)"; sleep 5
            done
            [ "$ok" = "1" ] || (echo "${svc} failed health check" && docker compose logs ${svc} && exit 1)
          done

      - name: Run E2E smoke tests
        run: |
          pip install httpx pytest pytest-timeout
          pytest e2e-tests/ -v --timeout=30

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to AWS ECS
    needs: integration-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          for svc in api-gateway user-service post-service comment-service notification-service; do
            docker build -t $REGISTRY/microblog/$svc:$TAG -t $REGISTRY/microblog/$svc:latest ./$svc
            docker push $REGISTRY/microblog/$svc:$TAG
            docker push $REGISTRY/microblog/$svc:latest
          done

      - name: Generate ECS task definitions from secrets
        env:
          ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          REGION: ${{ secrets.AWS_REGION }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          OTLP_ENDPOINT: ${{ secrets.OTLP_ENDPOINT }}
          OTEL_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        run: |
          mkdir -p ecs
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          cat > ecs/api-gateway.json <<EOF
          {
            "family": "microblog-api-gateway",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256", "memory": "512",
            "executionRoleArn": "arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskExecutionRole",
            "containerDefinitions": [{
              "name": "api-gateway", "image": "IMAGE_PLACEHOLDER", "essential": true,
              "portMappings": [{"name": "api-gateway", "containerPort": 8080, "protocol": "tcp", "appProtocol": "http"}],
              "environment": [
                {"name": "USER_SERVICE_HOST", "value": "user-service"},
                {"name": "POST_SERVICE_HOST", "value": "post-service"},
                {"name": "COMMENT_SERVICE_HOST", "value": "comment-service"},
                {"name": "NOTIFICATION_SERVICE_HOST", "value": "notification-service"}
              ],
              "logConfiguration": {"logDriver": "awslogs", "options": {"awslogs-group": "/ecs/microblog-api-gateway", "awslogs-region": "${REGION}", "awslogs-stream-prefix": "ecs", "awslogs-create-group": "true"}}
            }]
          }
          EOF

          for svc in user-service post-service comment-service notification-service; do
            PORT=$(case $svc in user-service) echo 8001;; post-service) echo 8002;; comment-service) echo 8003;; notification-service) echo 8004;; esac)
            DB=$(case $svc in user-service) echo userdb;; post-service) echo postdb;; comment-service) echo commentdb;; notification-service) echo notificationdb;; esac)

            MQ_ENV=""
            if [ "$svc" = "post-service" ] || [ "$svc" = "notification-service" ]; then
              MQ_ENV=', {"name": "RABBITMQ_URL", "value": "'"${RABBITMQ_URL}"'"}'
            fi

            cat > ecs/$svc.json <<EOF
          {
            "family": "microblog-${svc}",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256", "memory": "512",
            "executionRoleArn": "arn:aws:iam::${ACCOUNT_ID}:role/ecsTaskExecutionRole",
            "containerDefinitions": [{
              "name": "${svc}", "image": "IMAGE_PLACEHOLDER", "essential": true,
              "portMappings": [{"name": "${svc}", "containerPort": ${PORT}, "protocol": "tcp", "appProtocol": "http"}],
              "environment": [
                {"name": "DATABASE_URL", "value": "postgresql://postgres:${DB_PASSWORD}@${RDS_ENDPOINT}:5432/${DB}?sslmode=require"},
                {"name": "OTLP_ENDPOINT", "value": "${OTLP_ENDPOINT}"},
                {"name": "OTEL_EXPORTER_OTLP_HEADERS", "value": "${OTEL_HEADERS}"}
                ${MQ_ENV}
              ],
              "logConfiguration": {"logDriver": "awslogs", "options": {"awslogs-group": "/ecs/microblog-${svc}", "awslogs-region": "${REGION}", "awslogs-stream-prefix": "ecs", "awslogs-create-group": "true"}}
            }]
          }
          EOF
          done

      - name: Register new task definitions and update ECS services
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
          CLUSTER: microblog
        run: |
          for svc in api-gateway user-service post-service comment-service notification-service; do
            IMAGE="$REGISTRY/microblog/$svc:$TAG"

            TASK_DEF=$(sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" ecs/$svc.json)

            NEW_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            aws ecs update-service \
              --cluster $CLUSTER \
              --service microblog-$svc \
              --task-definition $NEW_ARN \
              --output text

            echo "Deployed microblog-$svc → $NEW_ARN"
          done
