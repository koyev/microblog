name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint & Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, post-service, comment-service, notification-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements.txt pylint black

      - name: Black format check
        working-directory: ${{ matrix.service }}
        run: black --check --diff main.py

      - name: Pylint static analysis
        working-directory: ${{ matrix.service }}
        run: |
          pylint main.py \
            --disable=C0114,C0115,C0116,R0903,W0611,W0612,W0613,E0401 \
            --fail-under=7.0

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - post-service
          - comment-service
          - notification-service
          - api-gateway
          - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag microblog/${{ matrix.service }}:${{ github.sha }} \
            ./${{ matrix.service }}
