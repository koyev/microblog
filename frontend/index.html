<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicroBlog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: 0.85rem; opacity: 0.6; }

    nav {
      background: #0f3460;
      display: flex;
      gap: 0;
    }
    nav button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      padding: 0.85rem 1.6rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
    }
    nav button:hover { color: #fff; background: rgba(255,255,255,0.05); }
    nav button.active { color: #e94560; border-bottom-color: #e94560; }

    main { max-width: 820px; margin: 2rem auto; padding: 0 1rem; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #0f3460; }

    form { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 0.55rem 0.9rem;
      border: 1.5px solid #dde3ec;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #0f3460; }
    button.submit {
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.2rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    button.submit:hover { background: #16213e; }
    button.submit:disabled { background: #aaa; cursor: not-allowed; }

    .msg { margin-top: 0.6rem; font-size: 0.82rem; min-height: 1.2em; }
    .msg.ok  { color: #2a9d5c; }
    .msg.err { color: #e94560; }

    ul.items { list-style: none; }
    ul.items li {
      padding: 0.65rem 0.9rem;
      border-bottom: 1px solid #f0f2f5;
      font-size: 0.9rem;
      display: flex;
      gap: 0.6rem;
      align-items: baseline;
    }
    ul.items li:last-child { border-bottom: none; }
    ul.items li .id {
      font-size: 0.75rem;
      background: #e8ecf4;
      color: #555;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    ul.items li .notif-dot {
      width: 8px; height: 8px;
      background: #e94560;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .empty { color: #aaa; font-size: 0.85rem; padding: 0.5rem 0; }

    .refresh-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .refresh-row button {
      background: none;
      border: 1.5px solid #0f3460;
      color: #0f3460;
      border-radius: 6px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .refresh-row button:hover { background: #0f3460; color: #fff; }
    .refresh-row span { font-size: 0.78rem; color: #888; }
  </style>
</head>
<body>

<header>
  <h1>MicroBlog</h1>
  <span>microservices demo</span>
</header>

<nav>
  <button class="active" onclick="showTab('users')">Users</button>
  <button onclick="showTab('posts')">Posts</button>
  <button onclick="showTab('comments')">Comments</button>
  <button onclick="showTab('notifications')">Notifications</button>
</nav>

<main>

  <!-- USERS -->
  <div id="tab-users" class="tab-content active">
    <div class="card">
      <h2>Create User</h2>
      <form onsubmit="createUser(event)">
        <input id="new-username" type="text" placeholder="username" required />
        <button class="submit" type="submit">Add User</button>
      </form>
      <p id="user-msg" class="msg"></p>
    </div>
    <div class="card">
      <h2>All Users</h2>
      <ul id="user-list" class="items"><li class="empty">Loading…</li></ul>
    </div>
  </div>

  <!-- POSTS -->
  <div id="tab-posts" class="tab-content">
    <div class="card">
      <h2>Create Post</h2>
      <form onsubmit="createPost(event)">
        <input id="new-content" type="text" placeholder="post content" required />
        <button class="submit" type="submit">Publish</button>
      </form>
      <p id="post-msg" class="msg"></p>
    </div>
    <div class="card">
      <h2>All Posts</h2>
      <ul id="post-list" class="items"><li class="empty">Loading…</li></ul>
    </div>
  </div>

  <!-- COMMENTS -->
  <div id="tab-comments" class="tab-content">
    <div class="card">
      <h2>Leave a Comment</h2>
      <form onsubmit="createComment(event)">
        <input id="new-comment" type="text" placeholder="comment text" required />
        <button class="submit" type="submit">Post Comment</button>
      </form>
      <p id="comment-msg" class="msg"></p>
    </div>
    <div class="card">
      <h2>All Comments</h2>
      <ul id="comment-list" class="items"><li class="empty">Loading…</li></ul>
    </div>
  </div>

  <!-- NOTIFICATIONS -->
  <div id="tab-notifications" class="tab-content">
    <div class="card">
      <div class="refresh-row">
        <button onclick="loadNotifications()">↻ Refresh</button>
        <span>Auto-refreshes every 3s — shows RabbitMQ events from post-service</span>
      </div>
      <ul id="notif-list" class="items"><li class="empty">Loading…</li></ul>
    </div>
  </div>

</main>

<script>
  const API = "/api";

  function showTab(name) {
    document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(el => el.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    document.querySelector(`nav button[onclick="showTab('${name}')"]`).classList.add("active");
    if (name === "notifications") loadNotifications();
  }

  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { "Content-Type": "application/json" },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    return res.json();
  }

  function renderList(ulId, items, renderFn) {
    const ul = document.getElementById(ulId);
    if (!items.length) {
      ul.innerHTML = '<li class="empty">Nothing here yet.</li>';
      return;
    }
    ul.innerHTML = items.map(renderFn).join("");
  }

  function setMsg(id, text, ok) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "msg " + (ok ? "ok" : "err");
    if (ok) setTimeout(() => { el.textContent = ""; }, 3000);
  }

  // ── Users ──────────────────────────────────────────────────────────────────
  async function loadUsers() {
    const users = await apiFetch("/users");
    renderList("user-list", users, u =>
      `<li><span class="id">#${u.id}</span>${u.username}</li>`);
  }

  async function createUser(e) {
    e.preventDefault();
    const input = document.getElementById("new-username");
    try {
      const u = await apiFetch("/users", { method: "POST", body: JSON.stringify({ username: input.value }) });
      setMsg("user-msg", `Created @${u.username}`, true);
      input.value = "";
      loadUsers();
    } catch (err) {
      setMsg("user-msg", err.message, false);
    }
  }

  // ── Posts ──────────────────────────────────────────────────────────────────
  async function loadPosts() {
    const posts = await apiFetch("/posts");
    renderList("post-list", posts, p =>
      `<li><span class="id">#${p.id}</span>${p.content}</li>`);
  }

  async function createPost(e) {
    e.preventDefault();
    const input = document.getElementById("new-content");
    try {
      const p = await apiFetch("/posts", { method: "POST", body: JSON.stringify({ content: input.value }) });
      setMsg("post-msg", `Post #${p.id} published — notification event sent to RabbitMQ`, true);
      input.value = "";
      loadPosts();
    } catch (err) {
      setMsg("post-msg", err.message, false);
    }
  }

  // ── Comments ───────────────────────────────────────────────────────────────
  async function loadComments() {
    const comments = await apiFetch("/comments");
    renderList("comment-list", comments, c =>
      `<li><span class="id">#${c.id}</span>${c.text}</li>`);
  }

  async function createComment(e) {
    e.preventDefault();
    const input = document.getElementById("new-comment");
    try {
      const c = await apiFetch("/comments", { method: "POST", body: JSON.stringify({ text: input.value }) });
      setMsg("comment-msg", `Comment #${c.id} posted`, true);
      input.value = "";
      loadComments();
    } catch (err) {
      setMsg("comment-msg", err.message, false);
    }
  }

  // ── Notifications ──────────────────────────────────────────────────────────
  async function loadNotifications() {
    const notifs = await apiFetch("/notifications");
    renderList("notif-list", notifs.slice().reverse(), n =>
      `<li><span class="notif-dot"></span>${n.message}</li>`);
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadUsers();
  loadPosts();
  loadComments();
  setInterval(loadNotifications, 3000);
</script>
</body>
</html>
